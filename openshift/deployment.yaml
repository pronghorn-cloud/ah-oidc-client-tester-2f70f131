# OpenShift Deployment Configuration for OIDC Testing Client
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-testing-client
  labels:
    app: oidc-testing-client
    app.kubernetes.io/name: oidc-testing-client
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oidc-testing-client
  template:
    metadata:
      labels:
        app: oidc-testing-client
    spec:
      containers:
        - name: oidc-testing-client
          image: oidc-testing-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              protocol: TCP
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: oidc-testing-client
  labels:
    app: oidc-testing-client
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: oidc-testing-client
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oidc-testing-client
  labels:
    app: oidc-testing-client
spec:
  to:
    kind: Service
    name: oidc-testing-client
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
