# Kustomize configuration for OIDC Testing Client
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oidc-testing-client

resources:
  - deployment.yaml
  - buildconfig.yaml
  - configmap.yaml

commonLabels:
  app.kubernetes.io/name: oidc-testing-client
  app.kubernetes.io/part-of: oidc-testing-suite

images:
  - name: oidc-testing-client
    newTag: latest
